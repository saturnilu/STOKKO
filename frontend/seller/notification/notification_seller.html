<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stokko - Notifications</title>
    <link rel="stylesheet" href="notification_seller.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <header class="main-header">
        <div class="header-logo">
            <img src="../images/logoBlue.png" alt="STOKKO">
            <span class="buyer-text">Seller</span>
        </div>

        <div class="header-right">
            <button class="btn-premium-top">
                <i class="fas fa-crown"></i>
                Upgrade To premium
            </button>

            <div class="user-profile">
                <img src="https://www.gravatar.com/avatar/?d=mp" alt="User" class="avatar">
                <div class="user-info">
                    <span class="user-name"></span>
                    <span class="user-email"></span>
                </div>
            </div>
        </div>
    </header>

    <div class="dashboard-container">

        <aside class="sidebar">
            <nav class="sidebar-menu">
                <a href="../dashboard/dashboard_seller.html" class="menu-item">
                    <i class="fas fa-th-large"></i>
                    Dashboard
                </a>
                <a href="../listing/listing_seller.html" class="menu-item">
                    <i class="fas fa-box"></i>
                    Listings
                </a>
                <a href="../orders/orders_seller.html" class="menu-item">
                    <i class="fas fa-shopping-cart"></i>
                    Orders
                </a>
                <a href="notification_seller.html" class="menu-item active">
                    <i class="fas fa-bell"></i>
                    Notification
                </a>
                <a href="../profilensubscription/subscription_seller.html" class="menu-item">
                    <i class="fas fa-user"></i>
                    Profile
                </a>
                <a href="../analytics/analytics.html" class="menu-item">
                    <i class="fas fa-chart-bar"></i>
                    Analytics
                </a>
            </nav>

            <div class="go-premium-card">
                <i class="fas fa-crown"></i>
                <h3>Go Premium</h3>
                <p>Unlock Analytics, Smart Pricing & more!</p>
                <a href="../profilensubscription/subscription_seller.html" style="text-decoration: none;">
                    <button class="btn-upgrade-now">
                        Upgrade Now
                    </button>
                </a>
            </div>
        </aside>

        <main class="main-content">
            <section class="notification-body">
                <div class="header-content">
                    <div>
                        <h1>Notifications</h1>
                        <p class="unread-count" id="unread-counter">Loading...</p>
                    </div>
                    <button class="btn-mark-all"><i class="far fa-check-circle"></i> Mark all as read</button>
                </div>

                <div class="notification-list" id="notification-container">
                </div>
            </section>
        </main>
    </div>
    <script src="notification_seller.js"></script>
</body>
</html>
