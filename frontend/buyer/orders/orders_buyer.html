<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stokko - Orders</title>
    <link rel="stylesheet" href="orders_buyer.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
</head>
<body>

    <header class="main-header">
        <div class="header-logo">
            <img src="../images/logoBlue.png" alt="STOKKO">
            <span class="buyer-text">Buyer</span>
        </div>

        <div class="header-right">
            <button class="btn-premium-top">
                <i class="fas fa-crown"></i>
                Upgrade To premium
            </button>

            <div class="user-profile">
                <img src="https://www.gravatar.com/avatar/?d=mp" alt="User" class="avatar">
                <div class="user-info">
                    <span class="user-name"></span>
                    <span class="user-email"></span>
                </div>
            </div>
        </div>
    </header>

    <div class="dashboard-container">

        <aside class="sidebar">
            <nav class="sidebar-menu">
                <a href="../market/dashboard_buyer.html" class="menu-item">
                    <i class="fas fa-box-open"></i>
                    Market
                </a>
                <a href="#" class="menu-item active">
                    <i class="fas fa-shopping-cart"></i>
                    Orders
                </a>
                <a href="../notification/notification_buyer.html" class="menu-item">
                    <i class="fas fa-bell"></i>
                    Notification
                </a>
                <a href="../profilensubscription/subscription_buyer.html" class="menu-item">
                    <i class="fas fa-user"></i>
                    Profile
                </a>
                <a href="../priceInsights/priceInsight.html" class="menu-item">
                    <i class="fas fa-chart-bar"></i>
                    Price Insights
                </a>
            </nav>

            <div class="go-premium-card">
                <i class="fas fa-crown"></i>
                <h3>Go Premium</h3>
                <p>Unlock Analytics, Smart Pricing & more!</p>
                <button class="btn-upgrade-now">
                    Upgrade Now
                </button>
            </div>
        </aside>

        <main class="main-content">
            <section class="dashboard-body">
                <div class="welcome-text">
                    <h1>Orders</h1>
                    <p>Manage and track your orders</p>
                </div>

                <div class="stats-grid">
                    <div class="stat-card">
                        <label>Total Purchase</label>
                        <p class="stat-value" id="stat-total">0</p>
                    </div>
                    <div class="stat-card">
                        <label>Pending</label>
                        <p class="stat-value warning" id="stat-pending">0</p>
                    </div>
                    <div class="stat-card">
                        <label>Delivery</label>
                        <p class="stat-value info" id="stat-delivery">0</p>
                    </div>
                    <div class="stat-card">
                        <label>Completed</label>
                        <p class="stat-value success" id="stat-completed">0</p>
                    </div>
                    <div class="stat-card">
                        <label>Review</label>
                        <p class="stat-value">0</p>
                    </div>
                </div>

                <div class="filter-section">
                    <div class="search-bar">
                        <i class="fas fa-search"></i>
                        <input type="text" id="order-search" placeholder="Search for products...">
                    </div>

                    <div class="status-dropdown-container" style="position: relative;">
                        <div class="status-dropdown" onclick="toggleFilterList(event)">
                            <span id="activeFilterLabel">All Status</span>
                            <i class="fas fa-chevron-down"></i>
                        </div>

                        <ul id="filterList" class="status-dropdown-list">
                            <li onclick="applyStatusFilter('All Status')">All Status</li>
                            <li onclick="applyStatusFilter('Paid')">Paid</li>
                            <li onclick="applyStatusFilter('Pending')">Pending</li>
                            <li onclick="applyStatusFilter('Delivery')">Delivery</li>
                            <li onclick="applyStatusFilter('Completed')">Completed</li>
                        </ul>
                    </div>
                </div>

                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>Invoice ID</th>
                                <th>Date</th>
                                <th>Items</th>
                                <th>Price</th>
                                <th>Status</th>
                                <th>Payment Method</th>
                                <th>Invoice</th>
                            </tr>
                        </thead>
                        <tbody id="orders-table-body">
                        </tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>

    <script src="../buyer-header.js"></script>
    <script src="orders_buyer.js"></script>
</body>
</html>
